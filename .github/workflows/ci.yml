name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: shellcheck scripts/*.sh

  validate-and-generate:
    name: Validate & Generate Skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill files
        run: make validate

      - name: Generate .toml files
        run: make generate

      - name: Validate install script (dry run)
        run: |
          mkdir -p /tmp/test-spring /tmp/test-dotnet
          bash scripts/install.sh spring-boot /tmp/test-spring agent "$(pwd)"
          bash scripts/install.sh dotnet      /tmp/test-dotnet agent "$(pwd)"
          echo "✔ Install scripts work correctly"

      - name: Check required files in install output
        run: |
          COMMON_REQUIRED=(
            SKILLS.md
            context.md
            architecture.md
            decisions.md
            conventions.md
            runbook.md
            glossary.md
            backlog_rules.md
            skills/shared/api-design.md
            skills/shared/database.md
            skills/shared/security.md
            skills/shared/observability.md
            skills/shared/error-handling.md
            skills/shared/bootstrap.md
            skills/shared/refactor.md
            skills/shared/anti-invention.md
            skills/shared/pattern-analysis.md
            skills/shared/gap-analysis.md
            skills/shared/spec-validation.md
            skills/shared/dor.md
            skills/shared/dod.md
          )
          FAILED=0
          for stack in spring-boot dotnet; do
            case "$stack" in
              spring-boot) target=/tmp/test-spring ;;
              dotnet)      target=/tmp/test-dotnet ;;
            esac
            for f in "${COMMON_REQUIRED[@]}" "skills/$stack/SKILL.md" "skills/$stack/testing.md"; do
              [ -f "$target/.agent/$f" ] || { echo "❌ Missing ($stack): $f"; FAILED=1; }
            done
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "✔ All required files present after install"

      - name: Verify skill count
        run: |
          EXPECTED=17
          ACTUAL=$(find skills -name "*.md" | wc -l)
          echo "Skills found: $ACTUAL (expected: $EXPECTED)"
          [ "$ACTUAL" -ge "$EXPECTED" ] || { echo "❌ Expected at least $EXPECTED skill files"; exit 1; }
          echo "✔ Skill count OK"
