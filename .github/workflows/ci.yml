name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: shellcheck scripts/*.sh tests/*.sh

  validate-and-install:
    name: Validate Skills & Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version consistency (plugin.json ↔ CHANGELOG)
        run: |
          PLUGIN_VERSION=$(sed -n 's/.*"version"[^"]*"\([^"]*\)".*/\1/p' .claude-plugin/plugin.json | head -1)
          CHANGELOG_VERSION=$(sed -n 's/^## \[\([0-9][^]]*\)\].*/\1/p' CHANGELOG.md | head -1)
          echo "plugin.json: $PLUGIN_VERSION | CHANGELOG: $CHANGELOG_VERSION"
          if [ "$PLUGIN_VERSION" != "$CHANGELOG_VERSION" ]; then
            echo "❌ plugin.json version and latest CHANGELOG entry must match"
            exit 1
          fi
          echo "✔ Versions are consistent"

      - name: Validate skill files
        run: make validate

      - name: Validate example TOON specs
        run: make validate-specs

      - name: Spec validator regression tests
        run: make test

      - name: Validate install script (dry run)
        run: |
          mkdir -p /tmp/test-spring /tmp/test-dotnet
          bash scripts/install.sh spring-boot /tmp/test-spring agent "$(pwd)"
          bash scripts/install.sh dotnet      /tmp/test-dotnet agent "$(pwd)"
          echo "✔ Install scripts work correctly"

      - name: Check required files in install output
        run: |
          COMMON_REQUIRED=(
            SKILLS.md
            context.md
            architecture.md
            decisions.md
            conventions.md
            runbook.md
            glossary.md
            backlog_rules.md
            skills/shared/api-design/SKILL.md
            skills/shared/database/SKILL.md
            skills/shared/security/SKILL.md
            skills/shared/observability/SKILL.md
            skills/shared/error-handling/SKILL.md
            skills/shared/bootstrap/SKILL.md
            skills/shared/refactor/SKILL.md
            skills/shared/anti-invention/SKILL.md
            skills/shared/pattern-analysis/SKILL.md
            skills/shared/gap-analysis/SKILL.md
            skills/shared/spec-validation/SKILL.md
            skills/shared/dor/SKILL.md
            skills/shared/dod/SKILL.md
          )
          FAILED=0
          for stack in spring-boot dotnet; do
            case "$stack" in
              spring-boot) target=/tmp/test-spring ;;
              dotnet)      target=/tmp/test-dotnet ;;
            esac
            for f in "${COMMON_REQUIRED[@]}" "skills/$stack/SKILL.md" "skills/$stack/testing.md"; do
              [ -f "$target/.agent/$f" ] || { echo "❌ Missing ($stack): $f"; FAILED=1; }
            done
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "✔ All required files present after install"

      - name: Verify skill count
        run: |
          EXPECTED=17
          ACTUAL=$(find skills -name "*.md" | wc -l)
          echo "Skills found: $ACTUAL (expected: $EXPECTED)"
          [ "$ACTUAL" -ge "$EXPECTED" ] || { echo "❌ Expected at least $EXPECTED skill files"; exit 1; }
          echo "✔ Skill count OK"
